<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>access-switch</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, sans-serif;
      line-height: 1.4;
    }
    body {
      margin: 0 auto;
      max-width: 32rem;
      padding: 1rem;
    }
    h1 {
      font-size: 1.25rem;
      margin: 0 0 1rem;
    }
    .card {
      border: 1px solid #8884;
      border-radius: 0.5rem;
      padding: 1rem;
      margin-bottom: 0.75rem;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }
    .name {
      font-weight: 600;
      word-break: break-all;
    }
    .meta {
      font-size: 0.85rem;
      opacity: 0.75;
      margin-top: 0.25rem;
    }
    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .badge.open { background: #2ecc4022; color: #1e7a28; }
    .badge.closed { background: #e74c3c22; color: #a82315; }
    button, input[type=password], select {
      font: inherit;
      padding: 0.55rem 0.9rem;
      border-radius: 0.4rem;
      border: 1px solid #8886;
    }
    button {
      cursor: pointer;
      min-width: 5.5rem;
    }
    button.primary { background: #2563eb; color: #fff; border-color: #2563eb; }
    button.danger { background: #dc2626; color: #fff; border-color: #dc2626; }
    button:disabled { opacity: 0.5; cursor: wait; }
    form label { display: block; margin-bottom: 0.35rem; font-size: 0.9rem; }
    form input { width: 100%; box-sizing: border-box; margin-bottom: 0.75rem; }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .toolbar-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .lang-select label {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }
    .error { color: #dc2626; font-size: 0.9rem; margin-top: 0.5rem; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <section id="login-view">
    <div class="toolbar">
      <h1>access-switch</h1>
      <div class="lang-select">
        <label for="lang-login" data-i18n="lang.label"></label>
        <select id="lang-login" aria-label="Language">{{LANG_OPTIONS}}</select>
      </div>
    </div>
    <form id="login-form">
      <label for="token" data-i18n="login.label"></label>
      <input id="token" type="password" autocomplete="current-password" required>
      <button type="submit" class="primary" data-i18n="login.submit"></button>
      <p id="login-error" class="error hidden"></p>
    </form>
  </section>

  <section id="app-view" class="hidden">
    <div class="toolbar">
      <h1>access-switch</h1>
      <div class="toolbar-actions">
        <div class="lang-select">
          <label for="lang-app" data-i18n="lang.label"></label>
          <select id="lang-app" aria-label="Language">{{LANG_OPTIONS}}</select>
        </div>
        <button type="button" id="logout" data-i18n="logout"></button>
      </div>
    </div>
    <div id="services"></div>
    <p id="app-error" class="error hidden"></p>
  </section>

  <script>
    const LANG = '{{LANG}}';
    const LOCALE = '{{LOCALE}}';
    const I18N = {{I18N}};

    const loginView = document.getElementById('login-view');
    const appView = document.getElementById('app-view');
    const servicesEl = document.getElementById('services');
    const loginError = document.getElementById('login-error');
    const appError = document.getElementById('app-error');
    const langLogin = document.getElementById('lang-login');
    const langApp = document.getElementById('lang-app');

    function t(key, vars = {}) {
      let text = I18N[key] || key;
      for (const [name, value] of Object.entries(vars)) {
        text = text.replace('{' + name + '}', value);
      }
      return text;
    }

    function applyI18n() {
      document.querySelectorAll('[data-i18n]').forEach((el) => {
        el.textContent = t(el.dataset.i18n);
      });
    }

    async function api(path, options = {}) {
      const response = await fetch(path, {
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
        ...options,
      });
      let data = null;
      const text = await response.text();
      if (text) {
        try { data = JSON.parse(text); } catch (_) { data = { raw: text }; }
      }
      return { response, data };
    }

    function showLogin(message) {
      loginView.classList.remove('hidden');
      appView.classList.add('hidden');
      if (message) {
        loginError.textContent = message;
        loginError.classList.remove('hidden');
      } else {
        loginError.classList.add('hidden');
      }
    }

    function showApp() {
      loginView.classList.add('hidden');
      appView.classList.remove('hidden');
      appError.classList.add('hidden');
    }

    function formatUpdatedAt(value) {
      if (!value) return t('updated.never');
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return t('updated.at', { date: date.toLocaleString(LOCALE) });
    }

    function renderServices(services) {
      servicesEl.innerHTML = '';
      if (!services.length) {
        servicesEl.innerHTML = '<p>' + t('services.empty') + '</p>';
        return;
      }
      for (const item of services) {
        const card = document.createElement('div');
        card.className = 'card';
        const open = !!item.open;
        card.innerHTML = `
          <div class="row">
            <div>
              <div class="name">${item.service}</div>
              <div class="meta">${formatUpdatedAt(item.updated_at)}</div>
            </div>
            <span class="badge ${open ? 'open' : 'closed'}">${open ? t('badge.open') : t('badge.closed')}</span>
          </div>
        `;
        const row = document.createElement('div');
        row.className = 'row';
        row.style.marginTop = '0.75rem';
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = open ? t('action.close') : t('action.open');
        btn.className = open ? 'danger' : 'primary';
        btn.addEventListener('click', () => toggleService(item.service, !open, btn));
        row.appendChild(document.createElement('div'));
        row.lastElementChild.appendChild(btn);
        card.appendChild(row);
        servicesEl.appendChild(card);
      }
    }

    async function loadStatus() {
      const { response, data } = await api('/admin/status');
      if (response.status === 401) {
        showLogin();
        return false;
      }
      if (!response.ok) {
        appError.textContent = (data && data.error) || '';
        appError.classList.remove('hidden');
        return false;
      }
      renderServices((data && data.services) || []);
      showApp();
      return true;
    }

    async function toggleService(service, open, button) {
      button.disabled = true;
      appError.classList.add('hidden');
      const { response, data } = await api('/admin', {
        method: 'POST',
        body: JSON.stringify({ service, open }),
      });
      if (response.status === 401) {
        showLogin(data && data.error ? data.error : '');
        return;
      }
      if (!response.ok) {
        appError.textContent = (data && data.error) || '';
        appError.classList.remove('hidden');
        button.disabled = false;
        return;
      }
      await loadStatus();
    }

    async function setLanguage(lang) {
      if (lang === LANG) return;
      const { response } = await api('/ui/lang', {
        method: 'POST',
        body: JSON.stringify({ lang }),
      });
      if (response.ok) {
        location.reload();
      }
    }

    document.getElementById('login-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      loginError.classList.add('hidden');
      const token = document.getElementById('token').value;
      const { response, data } = await api('/ui/login', {
        method: 'POST',
        body: JSON.stringify({ token }),
      });
      if (!response.ok) {
        loginError.textContent = (data && data.error) || '';
        loginError.classList.remove('hidden');
        return;
      }
      document.getElementById('token').value = '';
      await loadStatus();
    });

    document.getElementById('logout').addEventListener('click', async () => {
      await api('/ui/logout', { method: 'POST', body: '{}' });
      showLogin();
    });

    langLogin.addEventListener('change', () => setLanguage(langLogin.value));
    langApp.addEventListener('change', () => setLanguage(langApp.value));

    applyI18n();
    loadStatus();
  </script>
</body>
</html>
