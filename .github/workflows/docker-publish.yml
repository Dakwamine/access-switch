name: Publish Docker image

on:
  push:
    branches: [main, master]
    tags: ["*.*.*"]
  workflow_dispatch:

env:
  IMAGE: dakwamine/access-switch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          tools: composer

      - run: composer install --no-interaction
      - run: composer test
      - name: API smoke tests
        env:
          ACCESS_SWITCH_TOKEN: ci-test-token
          DEFAULT_OPEN: "false"
        run: |
          sudo mkdir -p /data/states
          sudo chmod 777 /data /data/states
          php -S 127.0.0.1:18080 -t public public/index.php &
          sleep 2
          DDEV_PRIMARY_URL=http://127.0.0.1:18080 ACCESS_SWITCH_TOKEN=ci-test-token bash scripts/test-api.sh

  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
