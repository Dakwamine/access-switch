name: Tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction

      - name: PHPUnit
        run: composer test

  integration:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction

      - name: API smoke tests
        env:
          ACCESS_SWITCH_TOKEN: ci-test-token
          STATE_FILE: ${{ github.workspace }}/data/state.json
          DEFAULT_OPEN: "false"
        run: |
          mkdir -p data
          php -S 127.0.0.1:18080 -t public public/index.php &
          sleep 2
          DDEV_PRIMARY_URL=http://127.0.0.1:18080 ACCESS_SWITCH_TOKEN=ci-test-token bash scripts/test-api.sh
